name: Windows cross-build validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install cross-build toolchain
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            clang-18=1:18.1.3-1ubuntu1 \
            lld-18=1:18.1.3-1ubuntu1 \
            llvm-18=1:18.1.3-1ubuntu1 \
            nsis=3.09-4ubuntu1
          sudo ln -sf "$(command -v clang-18)" /usr/local/bin/clang-cl
          for tool in lld-link llvm-lib llvm-rc; do
            sudo ln -sf "$(command -v "${tool}-18")" "/usr/local/bin/${tool}"
            command -v "${tool}"
          done
          clang-18 --version
          makensis -VERSION
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add x86_64-pc-windows-msvc
          cargo install cargo-xwin --version 0.22.0 --locked

      - name: Cache Rust dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/cargo-xwin
            src-tauri/target
          key: cargo-xwin-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-xwin-linux-

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build portable and NSIS
        shell: pwsh
        run: >
          pwsh -File Tools/Build-NinjaCrawler.ps1
          -Configuration Release
          -SkipLint
          -SkipTests

      - name: Generate validation changelog
        shell: pwsh
        run: |
          pwsh -File Tools/New-NinjaCrawlerChangelog.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -CurrentRef "${{ github.sha }}" `
            -CurrentTag "validation-${{ github.run_id }}" `
            -Repository "${{ github.repository }}" `
            -OutputPath "artifacts/CHANGELOG.md"

      - name: Package validation assets
        shell: pwsh
        run: >
          pwsh -File Tools/Package-NinjaCrawlerRelease.ps1
          -Version ${{ steps.version.outputs.version }}
          -TargetTriple x86_64-pc-windows-msvc
          -ChangelogPath artifacts/CHANGELOG.md
          -SkipCompanion

      - name: Reject legacy or bundled runtime artifacts
        shell: bash
        run: |
          set -euo pipefail
          if find release -maxdepth 1 -type f \( -name '*.zip' -o -name '*.msi' \) | grep -q .; then
            echo "Legacy ZIP or MSI artifact found." >&2
            exit 1
          fi
          test ! -e connectors/bootstrap
          sha256sum --check release/SHA256SUMS.txt

      - name: Upload validation artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: NinjaCrawler-${{ steps.version.outputs.version }}-cross-build-validation
          path: release/*
          if-no-files-found: error
          retention-days: 7
